<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karate Scoring Dashboard</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-grid.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-theme-alpine.min.css" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/dist/ag-grid-community.min.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="header-left">
      <h1>🥋 Karate Scoring Dashboard</h1>
      <span id="connection-badge" class="badge badge-disconnected">Buscando datos...</span>
    </div>
    <div class="header-right">
      <span id="version-label" class="version-label">v1.0 (GitHub)</span>
      <span id="last-update" class="last-update">—</span>
      <button id="btn-refresh-tatamis-global" class="btn-refresh" title="Actualizar tatamis">🔄 Actualizar datos</button>
    </div>
  </header>

  <section class="cards-row" id="summary-cards">
    </section>

  <section class="chart-section">
    <div class="chart-header">
      <h2>Combates pendientes por Tatami</h2>
      <div class="chart-controls">
        <div class="view-toggle">
          <button id="btn-chart-view" class="active" title="Gráfica de barras">📊 Gráfico</button>
          <button id="btn-race-view" title="Carrera de camellos">🐪 Carrera</button>
        </div>
      </div>
    </div>
    <div class="chart-container" id="chart-view" style="width: 80%; margin: 0 auto;">
      <canvas id="tatami-chart"></canvas>
    </div>
    <div class="camel-race-wrapper hidden" id="race-view">
      <div id="camel-race-track"></div>
      <div class="commentator" id="commentator-box">
        <div class="commentator-avatar">🎙️</div>
        <div class="commentator-body">
          <div class="commentator-name">Comentarista del Tatami</div>
          <div id="commentator-text">🎤 ¡Preparando los tatamis para la carrera de rendimiento!</div>
        </div>
      </div>
    </div>
  </section>

  <section class="table-section">
    <div class="table-header">
      <h2>Detalle de categorías</h2>
    </div>
    <div id="grid" class="ag-theme-alpine" style="width: 100%; height: 600px;"></div>
  </section>

  <script src="camel-race.js"></script>
  <script src="app.js"></script>
</body>
</html>
