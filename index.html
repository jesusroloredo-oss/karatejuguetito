<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karate Scoring Dashboard</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-grid.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-theme-alpine.min.css" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/dist/ag-grid-community.min.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="header-left">
      <h1>🥋 Karate Scoring Dashboard</h1>
      <span id="connection-badge" class="badge badge-connected">Datos Locales</span>
    </div>
    <div class="header-right">
      <span id="version-label" class="version-label">v1.0 (GitHub Pages)</span>
      <span id="last-update">—</span>
      <button id="btn-refresh-tatamis-global" class="btn-refresh" title="Recargar datos">🔄 Recargar</button>
    </div>
  </header>

  <section class="cards-row" id="summary-cards">
    <div class="card"><h3>Total Tatamis</h3><p id="total-tatamis">4</p></div>
    <div class="card"><h3>Combates Pendientes</h3><p id="total-matches">0</p></div>
  </section>

  <section class="chart-section">
    <div class="chart-header">
      <h2>Combates pendientes por Tatami</h2>
    </div>
    <div class="chart-container" id="chart-view" style="width: 80%; margin: 0 auto;">
      <canvas id="tatami-chart"></canvas>
    </div>
  </section>

  <section class="table-section">
    <div class="table-header">
      <h2>Detalle de categorías</h2>
    </div>
    <div id="grid" class="ag-theme-alpine" style="width: 100%; height: 400px;"></div>
  </section>

  <script src="app.js"></script>
</body>
</html>
